<title>Stoneware App · Grundstock Rezepte</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
:root{--bg:#F7F0F3;--card:#fff;--cream:#FFF8FB;--text:#351E29;--mid:#6B3F54;--soft:#9E7080;--mauve:#9B5E74;--dark:#6B2E44;--light:#C4899E;--xl:#EDD5DE;--border:#E8D5DC;--green:#4A7A5A;--amber:#B87840;--blue:#5A7BB5}
*{box-sizing:border-box} body{margin:0;background:linear-gradient(160deg,#F7F0F3,#FFF8FB);font-family:Nunito,system-ui,sans-serif;color:var(--text)} button,input,select,textarea{font:inherit} button{cursor:pointer}
.app{min-height:100vh;padding-bottom:80px} .header{position:sticky;top:0;z-index:50;background:linear-gradient(135deg,var(--dark),var(--mauve));color:white;padding:calc(14px + env(safe-area-inset-top,0px)) 14px 0;box-shadow:0 8px 30px rgba(107,46,68,.25)} .head-inner{max-width:980px;margin:auto} .brand{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px} .brand h1{font-family:Cormorant Garamond,serif;margin:0;font-size:24px;line-height:1;font-weight:700} .brand p{margin:2px 0 0;color:rgba(255,255,255,.55);font-size:11px;letter-spacing:1.4px;text-transform:uppercase}
.tabs{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none} .tabs::-webkit-scrollbar{display:none} .tab{white-space:nowrap;border:0;border-radius:12px 12px 0 0;padding:10px 13px;background:transparent;color:rgba(255,255,255,.7);font-size:13px;font-weight:800} .tab.active{background:var(--bg);color:var(--dark)} .wrap{max-width:980px;margin:auto;padding:18px 14px}
.hero{border-radius:26px;padding:26px 22px;background:linear-gradient(135deg,var(--dark),var(--mauve) 58%,var(--light));color:white;box-shadow:0 18px 44px rgba(107,46,68,.24);overflow:hidden;position:relative;margin-bottom:16px} .hero:before{content:"";position:absolute;right:-90px;top:-90px;width:260px;height:260px;border-radius:50%;background:rgba(255,255,255,.09)} .kicker{font-size:11px;letter-spacing:2.6px;text-transform:uppercase;color:rgba(255,255,255,.58);font-weight:900;margin:0 0 8px} .hero h2{font-family:Cormorant Garamond,serif;font-size:clamp(30px,8vw,48px);line-height:.98;margin:0 0 12px;font-weight:700;position:relative} .hero p{margin:0;font-size:14px;line-height:1.7;color:rgba(255,255,255,.78);max-width:620px;position:relative}
.grid{display:grid;gap:14px} .grid.two{grid-template-columns:repeat(2,minmax(0,1fr))} .grid.three{grid-template-columns:repeat(3,minmax(0,1fr))} @media(max-width:740px){.grid.two,.grid.three{grid-template-columns:1fr}.brand h1{font-size:21px}.wrap{padding:14px 12px}.hero{padding:24px 18px}}
.card{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:17px;box-shadow:0 8px 26px rgba(107,46,68,.08)} .card h3{font-family:Cormorant Garamond,serif;margin:0 0 8px;font-size:24px;line-height:1.05} .card p{margin:0;color:var(--mid);font-size:13.5px;line-height:1.65} .notice{background:#FBF4EB;border:2px solid #DDB87A;border-radius:18px;padding:15px;display:flex;gap:12px;align-items:flex-start;margin-bottom:16px} .notice p{margin:0;color:var(--mid);line-height:1.6;font-size:13.5px}
.btn{border:0;border-radius:999px;padding:12px 16px;font-weight:900;font-size:13px;background:linear-gradient(135deg,var(--mauve),var(--dark));color:white;box-shadow:0 8px 20px rgba(107,46,68,.18)} .btn.secondary{background:white;color:var(--dark);border:1px solid var(--border);box-shadow:none} .btn.blue{background:linear-gradient(135deg,var(--blue),var(--mauve))} .btn.full{width:100%}
.searchbar{display:flex;gap:8px;position:sticky;top:calc(98px + env(safe-area-inset-top,0px));z-index:30;background:rgba(247,240,243,.94);backdrop-filter:blur(8px);padding:10px 0;margin-bottom:12px} .searchbar input,.field,input,select,textarea{width:100%;border:1px solid var(--border);border-radius:14px;background:white;color:var(--text);padding:12px 13px;outline:none} .chips{display:flex;gap:7px;overflow-x:auto;padding:2px 0 12px;scrollbar-width:none} .chips::-webkit-scrollbar{display:none} .chip{white-space:nowrap;border:0;border-radius:999px;padding:8px 12px;background:var(--xl);color:var(--dark);font-size:12px;font-weight:900} .chip.active{background:var(--dark);color:white}
.recipe{position:relative;overflow:hidden} .recipe:before{content:"";position:absolute;left:0;top:0;right:0;height:5px;background:linear-gradient(90deg,var(--mauve),var(--light))} .meta{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0 10px} .pill{display:inline-flex;align-items:center;gap:4px;border-radius:999px;background:var(--xl);color:var(--dark);padding:4px 9px;font-size:11px;font-weight:900} .recipe h3{font-size:20px;margin-top:6px} .product-icon{height:120px;border-radius:28px;background:linear-gradient(135deg,var(--xl),white);display:flex;align-items:center;justify-content:center;font-size:54px;border:1px solid var(--border)} .fav{position:absolute;right:14px;top:13px;border:0;background:white;color:var(--mauve);width:36px;height:36px;border-radius:50%;box-shadow:0 4px 14px rgba(107,46,68,.12);font-size:18px} .fav.on{background:var(--mauve);color:white}
.modal{position:fixed;inset:0;background:rgba(58,31,42,.72);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding:12px;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain} .modal-box{position:relative;background:var(--cream);border-radius:26px;width:100%;max-width:820px;margin:0 auto;box-shadow:0 28px 70px rgba(58,31,42,.32)} .modal-head{background:linear-gradient(135deg,var(--dark),var(--mauve));color:white;padding:22px;border-radius:26px 26px 0 0;position:sticky;top:0;z-index:2} .close{position:absolute;right:14px;top:14px;border:0;background:rgba(255,255,255,.28);color:white;border-radius:50%;width:42px;height:42px;font-size:24px;line-height:1;z-index:10;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;display:flex;align-items:center;justify-content:center} .modal-body{padding:18px} .list{margin:0;padding:0;list-style:none} .list li{padding:8px 0;border-bottom:1px solid var(--border);display:flex;gap:8px;color:var(--mid);font-size:13.5px;line-height:1.55} .num{background:var(--mauve);color:white;border-radius:50%;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:900}
.tool-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px} @media(max-width:560px){.tool-row{grid-template-columns:1fr}.searchbar{top:calc(92px + env(safe-area-inset-top,0px))}.modal{padding:0;align-items:flex-start}.modal-box{border-radius:0;min-height:100%;margin:0}.modal-head{border-radius:0;padding-top:calc(22px + env(safe-area-inset-top,0px))}.close{top:calc(14px + env(safe-area-inset-top,0px))}.modal-body{padding:14px}}
.export-card{position:absolute;left:-9999px;top:0;width:1080px;height:1350px;background:linear-gradient(160deg,#FFF8FB,#F7EDF2 55%,#EED8E2);padding:78px;font-family:Nunito,sans-serif;color:var(--text)} .export-card.story{height:1920px;padding:110px 86px} .export-title{font-family:Cormorant Garamond,serif;font-size:76px;line-height:.98;font-weight:700;color:var(--text);margin:40px 0 22px} .export-card.story .export-title{font-size:92px} .small{font-size:12px;color:var(--soft);line-height:1.55} .footer-note{text-align:center;margin:26px 0;color:var(--soft);font-size:12px}

.product-real-img{
 width:100%;
 height:170px;
 object-fit:cover;
 border-radius:26px;
 display:block;
 background:#f7f2f4;
 box-shadow:0 10px 30px rgba(0,0,0,.12);
}
.product-wrap{
 position:relative;
}
.product-badge{
 position:absolute;
 left:12px;
 bottom:12px;
 background:rgba(255,255,255,.85);
 backdrop-filter:blur(10px);
 padding:6px 12px;
 border-radius:999px;
 font-weight:700;
 color:#6B2E44;
}

/* === Tools-Tab: Hinweise & Shop-Buttons === */
.product-tip{background:#FBF4EB;border:1px solid #DDB87A;border-radius:14px;padding:10px 12px;display:flex;gap:9px;align-items:flex-start;margin-top:12px;font-size:12.5px;color:var(--mid);line-height:1.55}
.product-tip-icon{font-size:18px;line-height:1;flex-shrink:0}
.btn-shop{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:0;border-radius:999px;padding:11px 16px;font-weight:900;font-size:12.5px;background:linear-gradient(135deg,var(--mauve),var(--dark));color:white;text-decoration:none;box-shadow:0 8px 20px rgba(107,46,68,.18);margin-top:12px;width:100%;box-sizing:border-box;cursor:pointer}
.btn-shop:active{transform:scale(.98)}
.conversion-info{background:linear-gradient(135deg,var(--xl),#FFF8FB);border:1px solid var(--border);border-radius:14px;padding:11px 14px;margin-top:12px;font-size:13px;color:var(--dark);font-weight:700;text-align:center}
.product-mini{display:flex;gap:12px;align-items:center;margin-bottom:8px}
.product-mini img{width:54px;height:54px;object-fit:cover;border-radius:14px;flex-shrink:0;box-shadow:0 4px 12px rgba(107,46,68,.12)}
.product-mini h3{margin:0;font-size:20px;line-height:1.1}

/* === Timer === */
.timer-display{font-family:Cormorant Garamond,Playfair Display,serif;font-weight:700;font-size:84px;text-align:center;letter-spacing:-3px;background:linear-gradient(135deg,var(--dark),var(--mauve));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:var(--dark);line-height:1;margin:18px 0 6px;font-variant-numeric:tabular-nums}
.timer-display.finished{animation:timerFlash 0.7s ease-in-out 3}
@keyframes timerFlash{0%,100%{opacity:1}50%{opacity:0.3}}
.timer-status{text-align:center;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--mid);margin:0 0 14px}
.timer-status.running{color:var(--mauve)}
.timer-presets{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:10px}
.timer-presets .chip{flex:0 0 auto;font-size:13px;padding:8px 14px}
.timer-controls{display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px;margin-top:12px}
.timer-controls .btn{width:100%;padding:13px 10px;font-size:13.5px}

/* === Import CTA (Screenshot -> Rezept) === */
.import-cta{background:linear-gradient(135deg,#FFF8FB,#F7E8EF);border:2px dashed var(--mauve);border-radius:20px;padding:18px 20px;display:flex;gap:14px;align-items:center;cursor:pointer;transition:transform .15s ease,box-shadow .15s ease;margin:12px 0 16px}
.import-cta:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(107,46,68,.15)}
.import-cta-icon{font-size:34px;line-height:1;flex-shrink:0}
.import-cta-text{flex:1;line-height:1.4}
.import-cta-text strong{color:var(--dark);font-size:15px;display:block;margin-bottom:2px}
.import-cta-text span{color:var(--mid);font-size:12.5px}
.import-cta-arrow{font-size:22px;color:var(--mauve);flex-shrink:0}

/* === Recipe Action Buttons (Timer + Einkaufsliste im Rezept) === */
.recipe-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0 4px}
.recipe-action-btn{display:flex;align-items:center;justify-content:center;gap:8px;border:0;border-radius:14px;padding:14px 16px;font-weight:800;font-size:13.5px;cursor:pointer;transition:transform .15s ease,box-shadow .15s ease;text-align:center;line-height:1.2}
.recipe-action-btn:active{transform:scale(.97)}
.recipe-action-timer{background:linear-gradient(135deg,var(--mauve),var(--dark));color:white;box-shadow:0 8px 18px rgba(107,46,68,.18)}
.recipe-action-shop{background:#FBF4EB;color:var(--dark);border:1.5px solid #DDB87A}

/* === Inline Step-Timer Chips === */
.step-timer{display:inline-flex;align-items:center;gap:4px;background:linear-gradient(135deg,var(--mauve),var(--dark));color:white;border:0;border-radius:999px;padding:3px 11px;font-size:12.5px;font-weight:800;cursor:pointer;vertical-align:baseline;margin:0 2px;white-space:nowrap;box-shadow:0 4px 10px rgba(107,46,68,.18);transition:transform .15s ease,box-shadow .15s ease;line-height:1.4}
.step-timer:active{transform:scale(.93)}
.step-timer:hover{box-shadow:0 6px 14px rgba(107,46,68,.28)}

/* === Navigation Improvements === */
.brand h1{cursor:pointer;transition:opacity .2s ease,transform .2s ease;display:inline-block}
.brand h1:hover{opacity:.75;transform:translateX(-2px)}
.tab.active{background:var(--bg);color:var(--dark);font-weight:900;box-shadow:inset 0 -3px 0 var(--dark)}
.tab:hover:not(.active){background:rgba(255,255,255,.12);color:white}
.back-bar{display:inline-flex;align-items:center;gap:8px;background:white;border:1.5px solid var(--border);border-radius:999px;padding:9px 18px;font-size:13px;font-weight:800;color:var(--dark);cursor:pointer;margin:18px 0 4px;transition:all .15s ease;text-decoration:none;user-select:none}
.back-bar:hover{background:var(--xl);border-color:var(--mauve);transform:translateX(-3px);box-shadow:0 6px 14px rgba(107,46,68,.18)}
.back-bar-arrow{font-size:18px;line-height:1}

/* === Toast === */
.smk-toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(40px);background:linear-gradient(135deg,var(--dark),var(--mauve));color:white;padding:14px 22px;border-radius:999px;font-weight:700;font-size:14px;box-shadow:0 18px 40px rgba(107,46,68,.28);opacity:0;transition:opacity .25s ease,transform .25s ease;z-index:9999;max-width:90vw;text-align:center;line-height:1.35}
.smk-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* === Empty State (Einkaufsliste) === */
.empty-state{text-align:center;padding:30px 20px;color:var(--mid)}
.empty-state-icon{font-size:48px;margin-bottom:12px;opacity:.6}
.empty-state h4{font-family:Cormorant Garamond,serif;font-size:24px;margin:0 0 6px;color:var(--dark);font-weight:600}
.empty-state p{margin:0;font-size:13.5px;line-height:1.5}

</style>
</head>
<body>
<div class="app">
<header class="header"><div class="head-inner"><div class="brand"><div><h1 onclick="showTab('home')" title="Zur Startseite">Stoneware App</h1></div><button class="btn secondary" onclick="showTab('finder')">Produktfinder</button></div><nav class="tabs" id="tabs"></nav></div></header>
<main id="content"></main></div><div id="modalRoot"></div>
<script>
const products = [{"id": "home", "label": "Start", "emoji": "🏠"}, {"id": "all", "label": "Alle Rezepte", "emoji": "🍳"}, {"id": "ofenmeister", "label": "Ofenmeister", "emoji": "🏺", "desc": "Brot, One Pot, Schmorgerichte, Aufläufe und große Familienportionen."}, {"id": "lilly", "label": "Lilly", "emoji": "🫙", "desc": "Kleine Brote, Beilagen, Kuchen und kleine Portionen – auch für den kleinen Zaubermeister (1,2 L)."}, {"id": "ofenhexe", "label": "Ofenhexe", "emoji": "🥘", "desc": "Aufläufe, Ofengerichte, Familienessen und Feierabendbleche."}, {"id": "ofenzauberer", "label": "James", "emoji": "🍕", "desc": "Pizza, Flammkuchen, Focaccia, Blechgerichte und Ofengemüse."}, {"id": "zauberstein", "label": "Zauberstein", "emoji": "🪨", "desc": "Pizza, Brot, Brötchen, Fladenbrot und knusprige Snacks."}, {"id": "white-lady", "label": "White Lady", "emoji": "🍪", "desc": "Kuchen, Brownies, Zimtschnecken, Cookies und süße Blechideen."}, {"id": "grillpfanne", "label": "Grillpfanne", "emoji": "🔥", "desc": "Gusseiserne Bratpfanne vom Grill: Gyros, Nachos, Fisch, Pancakes und herzhafte Pfannengerichte."}, {"id": "grillstein", "label": "Grillstein", "emoji": "🫓", "desc": "Rechteckiger Grillstein: Pizza, Focaccia, Grillgemüse, Fisch und gegrillte Früchte."}, {"id": "shopping", "label": "Einkaufsliste", "emoji": "🧾"}, {"id": "tools", "label": "Tools", "emoji": "🧮"}, {"id": "finder", "label": "Finder", "emoji": "🛒"}];

verteilen und Wellen formen.", "Bei 160°C weitere 15 Minuten backen."]}, {"id": 900, "product": "ofenzauberer", "title": "Selterskuchen vom James", "category": "Kuchen", "time": "25–30 Min", "temp": "180°C", "portions": "1 James", "ingredients": ["300 g Mehl", "250 g Zucker", "4 Eier", "250 ml Öl", "250 ml Zitronenlimonade", "1 Pck. Backpulver"], "steps": ["Alles zu einem glatten Teig verrühren.", "Auf dem James verteilen.", "Goldgelb backen und optional glasieren."]}, {"id": 901, "product": "ofenhexe", "title": "Mac & Cheese Familienauflauf", "category": "Auflauf", "time": "35–40 Min", "temp": "200°C", "portions": "4–6", "ingredients": ["500 g Makkaroni", "400 ml Milch", "200 ml Sahne", "250 g Käse", "1 TL Senf", "Salz & Pfeffer"], "steps": ["Nudeln vorkochen.", "Sauce verrühren und mit den Nudeln mischen.", "In der Ofenhexe überbacken."]}, {"id": 902, "product": "ofenmeister", "title": "Pulled Pork aus dem Ofenmeister", "category": "Fleisch", "time": "5 Std", "temp": "140°C", "portions": "6", "ingredients": ["1,5 kg Schweinenacken", "BBQ Rub", "200 ml Apfelsaft", "BBQ Sauce"], "steps": ["Fleisch würzen und in den Ofenmeister legen.", "Mit Apfelsaft angießen.", "Langsam garen bis es zerfällt.", "Zerpflücken und mit BBQ Sauce mischen."]}, {"id": 903, "product": "lilly", "title": "Curryreis aus der Lilly", "category": "Beilage", "time": "35 Min", "temp": "200°C", "portions": "2–3", "ingredients": ["200 g Reis", "400 ml Brühe", "100 ml Kokosmilch", "1 TL Curry", "Gemüse nach Wahl"], "steps": ["Alles in die Lilly geben.", "Mit Deckel garen.", "Vor dem Servieren umrühren."]}, {"id": 904, "product": "ofenzauberer", "title": "Pizzabrötchen vom James", "category": "Snack", "time": "20 Min", "temp": "220°C", "portions": "12 Stück", "ingredients": ["Brötchenteig", "Tomatensauce", "Käse", "Salami oder Gemüse"], "steps": ["Teig füllen und formen.", "Auf dem James verteilen.", "Goldbraun backen."]}, {"id": 1001, "product": "grillpfanne", "title": "Gyrospfanne vom Grill", "category": "Fleisch", "time": "ca. 20 Min", "temp": "350°C → indirekt", "portions": "2–3", "ingredients": ["400 g Gyros vom Metzger", "1 Zwiebel", "1 Paprika", "200 g Feta"], "steps": ["Den Grill auf 350°C vorheizen. Die Gusseiserne Bratpfanne flach daraufstellen und 5 Minuten vorheizen.", "Etwas Öl auf der Pfanne verteilen. Das Fleisch dazugeben und einige Minuten gut anbraten. Zwiebel und Paprika schneiden, dazugeben und alles weiter anbraten, bis das Fleisch gar ist.", "Den Grill auf indirekte Hitze stellen. Den Feta über das Gyros bröseln, den Grilldeckel schließen und den Käse 5–10 Minuten schmelzen lassen. Mit Fladenbrot und frischem Salat servieren."]}, {"id": 1002, "product": "grillpfanne", "title": "Foccacia vom Grill", "category": "Brot", "time": "20–22 Min (+ Gehzeit)", "temp": "200°C indirekt", "portions": "1 Foccacia", "ingredients": ["500 g Mehl Type 550", "360 ml Wasser (lauwarm)", "30 ml Olivenöl", "10 g Salz", "1/2 Würfel Hefe", "1 TL Zucker", "Olivenöl", "Oliven", "Frischer Rosmarin", "Grobes Meersalz"], "steps": ["Wasser mit Zucker und Hefe vermischen. Mehl, Salz und Olivenöl hinzugeben und gründlich verkneten, bis ein geschmeidiger Hefeteig entsteht. Den Teig ca. 60 Minuten gehen lassen.", "Die Pfanne flach einfetten, den Teig darauf verteilen und mit Olivenöl bestreichen. Weitere 30 Minuten gehen lassen. In der Zwischenzeit den Grill auf 200°C indirekte Hitze vorheizen.", "Mit den Fingern die typischen Dellen in den Teig drücken. Oliven und Rosmarin verteilen, etwas grobes Meersalz darübergeben. Auf dem Grill 20–22 Minuten bei geschlossenem Deckel goldbraun backen."]}, {"id": 1003, "product": "grillpfanne", "title": "Überbackene Nachos mit Rinderhack", "category": "Snack", "time": "ca. 20 Min", "temp": "240°C", "portions": "3–4", "ingredients": ["200 g Gouda", "200 g Cheddar", "1 Paprika", "1 rote Zwiebel", "2–3 EL hoch erhitzbares Öl", "500 g Hackfleisch", "1 Päckchen Taco-Würzmischung", "1 Dose Mais", "8–10 Jalapeño-Scheiben (aus dem Glas)", "Petersilie zum Garnieren"], "steps": ["Die Pfanne flach auf den Grill stellen und den Grill auf 240°C vorheizen.", "Den Käse reiben. Paprika und rote Zwiebel zerkleinern.", "Öl in die Pfanne geben und das Hackfleisch mit den Gewürzen krümelig anbraten. Die Zwiebeln dazugeben und mitbraten.", "Paprika und Mais auf das Hackfleisch geben, Hitze etwas reduzieren. Nach ca. 5 Minuten etwas Käse darübergeben, die Nachos dazugeben und mit dem restlichen Käse bestreuen.", "Den Deckel schließen und alles ca. 5 Minuten überbacken.", "Zum Schluss mit Jalapeños und Petersilie garnieren."]}, {"id": 1004, "product": "grillpfanne", "title": "Loaded Nachos vom Grill", "category": "Snack", "time": "ca. 30 Min (+ 1 Std marinieren)", "temp": "350°C → indirekt", "portions": "3–4", "ingredients": ["400 g Hähnchen- oder Putenbrustfilet", "Salz, Pfeffer, Rauchpaprika, Knoblauchpulver", "2–3 EL Öl", "1 Paprika", "1 rote Zwiebel", "1 Knoblauchzehe", "1 kleine Dose Mais", "200 g Nachos", "200 g geriebener Käse", "Etwas Crème fraîche und Frühlingszwiebeln zum Servieren"], "steps": ["Das Fleisch in mundgerechte Stücke schneiden.", "Mit den Gewürzen und 1 EL Öl mischen und ca. 1 Stunde im Kühlschrank ziehen lassen.", "Paprika und Zwiebel in Streifen schneiden, Knoblauch pressen, Mais dazugeben.", "Den Grill auf 350°C vorheizen, die Pfanne 5 Minuten vorheizen. Etwas Öl hineingeben und das Fleisch kross anbraten. Das Gemüse zugeben, mitbraten und alles vermengen. Anschließend in eine Schüssel geben.", "Den Grill auf indirekte Hitze stellen. Eine Schicht Nachos in die Pfanne geben, die Hälfte des Belags und des Käses darauf verteilen, eine weitere Schicht Nachos und den Rest wiederholen. Einige Minuten überbacken. Mit Crème fraîche und Frühlingszwiebeln servieren."]}, {"id": 1005, "product": "grillpfanne", "title": "Bratkartoffeln vom Grill", "category": "Beilage", "time": "ca. 20 Min", "temp": "Grill heiß", "portions": "2–3", "ingredients": ["400 g Kartoffeln", "etwas Rapsöl", "1 TL Salz", "2 TL Paprikapulver, geräuchert"], "steps": ["Den Grill mit der Pfanne flach vorheizen.", "Die Kartoffeln in ca. 2 x 2 cm große Stücke schneiden und mit Rapsöl, Salz und Paprikapulver vermischen.", "Die Kartoffeln auf die heiße Pfanne geben und regelmäßig wenden. Nach ca. 20 Minuten sind sie fertig.", "Dazu passt ein Dip mit frischen Kräutern und Quark."]}, {"id": 1006, "product": "grillpfanne", "title": "Lammfilet mit gegrillten Auberginenscheiben", "category": "Fleisch", "time": "ca. 10 Min (+ 1 Std marinieren)", "temp": "Grill mittel-heiß", "portions": "4", "ingredients": ["4 Lammfilets", "Für die Marinade: Schale einer Zitrone", "1 EL Majoran", "1 TL Kümmel", "1/2 Bund Petersilie", "8 EL Olivenöl", "Salz & Pfeffer", "1 Aubergine", "Saft einer Zitrone", "Olivenöl", "Salz & etwas Majoran"], "steps": ["Lammfilets abspülen und trockentupfen. Mit abgeriebener Zitronenschale einreiben und mit Majoran, Kümmel, Salz und Pfeffer würzen.", "Petersilie fein hacken, mit Olivenöl verrühren, die Filets darin einlegen und zugedeckt mindestens 1 Stunde im Kühlschrank durchziehen lassen.", "Auberginen in 1 cm dicke Scheiben schneiden, mit Salz einreiben und ca. 20 Minuten Wasser ziehen lassen, dann trockentupfen.", "Zitronensaft auspressen, die Auberginen damit einreiben, mit Olivenöl bestreichen und mit Majoran würzen.", "Die Pfanne flach auf dem Grill vorheizen und etwas Öl verteilen.", "Lammfilets aus der Marinade heben, abtropfen lassen, in die Pfanne geben und die Auberginen drumherum verteilen.", "Fleisch und Auberginen von jeder Seite 4–5 Minuten grillen und mit frischen Kräutern garnieren."]}, {"id": 1007, "product": "grillpfanne", "title": "Dorade vom Grill", "category": "Fisch", "time": "20–30 Min", "temp": "mittlere Hitze", "portions": "2", "ingredients": ["2 Doraden (fertig geschuppt)", "2 Knoblauchzehen", "2 Zweige Rosmarin", "2 Zweige Thymian", "1 Zitrone", "Olivenöl", "Salz & Pfeffer", "Butterschmalz"], "steps": ["Doraden waschen, trockentupfen und die Haut quer einschneiden.", "Knoblauch würfeln, mit Olivenöl, Salz und Pfeffer verrühren und die Fische innen damit einstreichen.", "Zitrone in Scheiben schneiden und den Bauchraum mit Zitrone, Rosmarin und Thymian füllen.", "Die Pfanne flach bei mittlerer Hitze vorheizen, etwas Butterschmalz hineingeben und die Fische darauf platzieren.", "Bei mittlerer Hitze je nach Dicke ca. 10–15 Minuten von jeder Seite grillen."]}, {"id": 1008, "product": "grillpfanne", "title": "Pancakes vom Grill", "category": "Süßes", "time": "ca. 20 Min", "temp": "230°C", "portions": "ca. 10 Stück", "ingredients": ["250 ml Milch", "2 Eier", "3 EL Öl", "1 EL Vanilleextrakt", "220 g Dinkelmehl Type 630", "1 EL Puderzucker", "1 Päckchen Vanillezucker", "1 Prise Salz", "etwas Öl zum Ausbacken"], "steps": ["Zuerst alle flüssigen, dann die trockenen Zutaten in den Teigmischer geben.", "Verschließen und alles gut vermengen.", "Die Pfanne flach im Grill auf ca. 230°C vorheizen.", "Die Pfanne großzügig einfetten.", "Die Pancakes portionsweise in die Pfanne geben.", "Sobald sie goldbraun sind, wenden und von der anderen Seite ebenfalls goldbraun backen.", "Fertige Pancakes warmhalten, bis alle gebacken sind."]}, {"id": 1101, "product": "grillstein", "title": "Pestoschnecken", "category": "Snack", "time": "18–20 Min (+ Gehzeit)", "temp": "200°C indirekt", "portions": "ca. 10 Stück", "ingredients": ["330 g Mehl Type 405", "1/2 Würfel frische Hefe", "200 ml Wasser", "10 g Salz", "1 EL Zucker", "3–4 EL Olivenöl", "100 g Pesto (rot oder grün)", "Käse nach Belieben (z. B. Gouda)"], "steps": ["Hefe und Zucker im lauwarmen Wasser auflösen. Restliche Zutaten zugeben und zu einem geschmeidigen Hefeteig verarbeiten. Abgedeckt ca. 1 Stunde gehen lassen.", "Den Grill auf ca. 200°C vorheizen. Den Teig flach ausrollen, Pesto darauf verteilen und Käse darüber reiben. Von der langen Seite aufrollen und in ca. 2 cm breite Schnecken teilen. Den Grillstein dünn einfetten und die Schnecken daraufsetzen.", "Den Grill auf indirekte Hitze stellen und den Grillstein daraufstellen. Die Schnecken ca. 18–20 Minuten backen, bis sie schön gebräunt sind."]}, {"id": 1102, "product": "grillstein", "title": "Pesto-Grillgemüse-Bruschetta", "category": "Vegetarisch", "time": "ca. 25 Min", "temp": "350°C → indirekt", "portions": "4", "ingredients": ["150 g grüner Spargel", "150 g Kirschtomaten", "1 Paprika", "1 rote Zwiebel", "1 Knoblauchzehe", "100 g Pesto", "Salz, Pfeffer, Paprikapulver", "1 Handvoll Basilikum", "1 Baguette zum Servieren", "Geröstete Pinienkerne (optional)"], "steps": ["Das Gemüse in mundgerechte Stücke schneiden und mit den restlichen Zutaten (außer Pinienkerne, Basilikum und Baguette) vermengen und ziehen lassen.", "Den Grill auf 350°C vorheizen. Den Grillstein ca. 15 Minuten mit vorheizen, dann auf indirekte Hitze stellen. Das Gemüse darauf garen, bis es bissfest ist.", "Das Baguette in Scheiben schneiden und kurz anrösten, nach Wunsch mit Knoblauch einreiben. Basilikum in Streifen schneiden, Pinienkerne kurz anrösten.", "Das Grillgemüse auf dem Baguette verteilen, Basilikum und Pinienkerne darübergeben und servieren."]}, {"id": 1103, "product": "grillstein", "title": "Grill-Kartoffeln", "category": "Beilage", "time": "ca. 15 Min", "temp": "Grill heiß", "portions": "2–3", "ingredients": ["ca. 300–400 g Drillinge, vorgekocht", "Rapsöl", "Kartoffelgewürz"], "steps": ["Kartoffeln halbieren und mit Rapsöl und Gewürz vermischen.", "Den Grillstein auf dem Grill gut vorheizen.", "Die Kartoffeln mit der Schnittfläche nach unten auflegen und einige Minuten anbraten, dann wenden und von allen Seiten goldbraun grillen.", "Die knusprigen Grill-Kartoffeln passen zu vielen Grillgerichten."]}, {"id": 1104, "product": "grillstein", "title": "Gemischtes Grillgemüse", "category": "Vegetarisch", "time": "ca. 15 Min (+ 30 Min ziehen)", "temp": "Grill heiß", "portions": "4", "ingredients": ["Gemüse nach Wahl (z. B. Paprika, Zucchini, Aubergine, Champignons, Porree, Sellerie)", "2 EL Olivenöl", "1 Knoblauchzehe", "2 TL italienische Kräuter", "1 EL Zitronensaft", "Salz & Pfeffer"], "steps": ["Gemüse waschen, ggf. entkernen und in Scheiben oder Streifen schneiden.", "Mit Gewürzen, Olivenöl, gepresstem Knoblauch und Zitronensaft vermischen und 30 Minuten ziehen lassen.", "Den Grillstein auf dem Grill gut vorheizen.", "Das Gemüse ohne zusätzliches Fett auf dem Stein verteilen und von beiden Seiten einige Minuten grillen."]}, {"id": 1105, "product": "grillstein", "title": "Rösti-Ecken mit Grillgemüse", "category": "Beilage", "time": "ca. 15 Min", "temp": "Grill heiß", "portions": "3–4", "ingredients": ["1 Packung Rösti-Ecken (TK)", "Gemüse nach Wahl (z. B. Paprika, Zucchini, Aubergine, Zwiebel)", "2 EL Olivenöl", "1 Knoblauchzehe", "1 TL italienische Kräuter", "1 EL Zitronensaft", "Salz & Pfeffer", "Etwas Öl für den Grillstein"], "steps": ["Gemüse waschen, ggf. entkernen und in Scheiben oder Streifen schneiden.", "Mit Gewürzen, Olivenöl, gepresstem Knoblauch und Zitronensaft vermischen und 30 Minuten ziehen lassen.", "Rösti-Ecken etwas antauen lassen.", "Den Grillstein gut vorheizen und etwas Öl hineingeben.", "Rösti-Ecken und Gemüse auf dem Stein verteilen und von beiden Seiten einige Minuten grillen."]}, {"id": 1106, "product": "grillstein", "title": "Berner Würstchen mit Feta-Kartoffeln", "category": "Fleisch", "time": "ca. 25 Min", "temp": "Grill heiß", "portions": "3–4", "ingredients": ["1 Packung Berner Würstchen", "300 g Kartoffeln", "3 EL Rapsöl", "2 TL Paprikapulver", "1 Zwiebel", "1 Feta", "etwas Kokosöl oder Butterschmalz"], "steps": ["Den Grill mit dem Grillstein zusammen vorheizen.", "Kartoffeln in Spalten schneiden und mit Rapsöl und Paprikapulver marinieren.", "Zwiebeln in Scheiben schneiden und separat aufbewahren.", "Den Feta in Würfel schneiden und separat aufbewahren.", "Den Grillstein mit etwas Kokosfett oder Butterschmalz fetten und die Kartoffeln darauflegen.", "Die Kartoffeln gut wenden. Nach ca. 15 Minuten die Zwiebeln dazugeben und die Berner Würstchen am Rand verteilen.", "Nach 5 Minuten den Feta darauf verteilen.", "Fertig, wenn die Kartoffeln leicht gebräunt und knusprig sind. Heiß genießen."]}, {"id": 1107, "product": "grillstein", "title": "Lachs mit grünem Spargel vom Grill", "category": "Fisch", "time": "ca. 20 Min", "temp": "Grill heiß", "portions": "2", "ingredients": ["1 Lachsfilet mit Haut", "500 g grüner Spargel", "etwas Zitronenpfeffer"], "steps": ["Den Grill mit dem Grillstein zusammen vorheizen.", "Den grünen Spargel im unteren Drittel festhalten und den Stiel abknicken; er bricht dort, wo das holzige Ende aufhört.", "Den Lachs auf der Oberseite mit etwas Zitronenpfeffer einreiben.", "Den Lachs mit der Hautseite auf den heißen Stein legen und den Spargel links und rechts verteilen. Wenn die Haut sich abzulösen beginnt, den Lachs drehen.", "Nach ca. 20 Minuten sind Lachs und Spargel fertig gegrillt."]}, {"id": 1108, "product": "grillstein", "title": "Panuozzo – italienisches Pizza-Sandwich", "category": "Pizza", "time": "ca. 20 Min (+ 1 Std Gehzeit)", "temp": "Grill heiß", "portions": "3", "ingredients": ["Für den Teig: 220 ml Wasser", "1 TL Zucker", "20 g Hefe, frisch", "400 g Weizenmehl Type 550", "30 ml Olivenöl", "1 TL Salz", "Für die Füllung: Rucola", "Einige Tomaten", "Grünes Pesto", "Einige Scheiben Prosciutto", "3 Burrata Kugeln", "Olivenöl", "Balsamico-Creme", "Salz & Pfeffer", "Geröstete Pinienkerne (optional)"], "steps": ["Alle Zutaten für den Teig zu einem Hefeteig verkneten und abgedeckt 1 Stunde gehen lassen.", "Teig leicht bemehlen, in 3 gleich große Teile schneiden, rundwirken und mit einem Tuch abdecken.", "Den Grillstein auf dem Grill gut vorheizen.", "Die Teiglinge zu runden Pizzen ausrollen, mit 1 EL Olivenöl bestreichen und zusammenklappen.", "Auf dem Grillstein von beiden Seiten ohne Fett ca. 10 Minuten goldbraun backen.", "Rucola und Tomaten waschen, Tomaten in Scheiben schneiden.", "Den Pizzaboden aufklappen, eine Seite mit Pesto bestreichen und mit Rucola, Tomaten und Prosciutto belegen. Burrata darübergeben und vorsichtig verteilen.", "Mit Olivenöl, Balsamico-Creme, Salz und Pfeffer beträufeln und mit Pinienkernen bestreuen.", "Die Pizza zusammenklappen und genießen."]}, {"id": 1109, "product": "grillstein", "title": "Pizza vom Grillstein", "category": "Pizza", "time": "10–15 Min (+ 60 Min Gehzeit)", "temp": "250°C", "portions": "1 Pizza", "ingredients": ["Für den Teig: 1/4 Würfel Hefe", "Prise Zucker", "150 ml lauwarmes Wasser", "215 g Mehl Type 405", "1/2 TL Salz", "2 EL Olivenöl", "Hartweizengrieß zum Ausstreuen", "Für die Füllung: 200 g stückige Tomaten (Dose)", "2 TL italienische Kräuter", "Salz / Pfeffer / Zucker", "1 Kugel Mozzarella", "Belag nach Wunsch (z. B. Salami, Schinken, Zwiebeln, Grillgemüse)"], "steps": ["Die Hefe mit einer Prise Zucker im lauwarmen Wasser auflösen.", "Die restlichen Zutaten zugeben und zu einem Teig verkneten.", "Den Teig abgedeckt mind. 60 Minuten an einem warmen Ort gehen lassen.", "Am Ende der Gehzeit den Grill mit dem Grillstein auf 250°C vorheizen.", "Den Teig auf mit Hartweizengrieß ausgestreuter Unterlage ausrollen.", "Stückige Tomaten mit Kräutern, Salz, Pfeffer und Zucker verrühren und auf dem Teig verteilen.", "Den Mozzarella reiben und auf dem Teig verteilen.", "Mit Belag nach Wunsch belegen und auf den heißen Grillstein schieben.", "Die Pizza ist fertig, wenn der Rand leicht braun wird. Evtl. die Hitze reduzieren."]}, {"id": 1110, "product": "grillstein", "title": "Gegrillte Früchte mit Joghurt-Minzsoße", "category": "Süßes", "time": "ca. 15 Min", "temp": "350°C → indirekt", "portions": "4", "ingredients": ["Obst nach Wahl (z. B. Pfirsiche, Ananas, Äpfel, Birnen, Bananen)", "Für die Joghurt-Minzsoße: 500 g griechischer Joghurt", "50 g Zucker", "Saft einer Limette", "1/2 Bund Minze, klein gehackt"], "steps": ["Den Grill auf 350°C vorheizen. Den Grillstein ca. 15 Minuten vorheizen, dann auf indirekte Hitze stellen.", "Obst in mundgerechte Stücke schneiden und auf den Stein legen. Grillen, bis das Obst schön weich ist.", "In der Zwischenzeit alle Zutaten für die Joghurt-Minzsoße vermengen und zum Grillobst servieren."]}, {"id": 1201, "product": "lilly", "title": "Rustikales Sauerteig-Krustenbrot", "category": "Brot", "time": "65 Min (+ ca. 17 Std Reife)", "temp": "250°C → 220°C", "portions": "1 Brot", "ingredients": ["100 g aktives Anstellgut (Weizen)", "300 g Weizenmehl Type 550", "100 g Roggenmehl Type 1150", "50 g Weizenvollkornmehl", "300 g Wasser, lauwarm", "10 g Salz"], "steps": ["Anstellgut, Mehle und Wasser grob verkneten und 30 Minuten quellen lassen.", "Salz zugeben und 8–10 Minuten kneten, bis der Teig glatt ist.", "Stockgare ca. 5 Stunden, in der ersten Stunde dreimal dehnen und falten.", "Rundwirken, ins bemehlte Körbchen geben und über Nacht in den Kühlschrank stellen.", "In den gefetteten, bemehlten Topf stürzen und einschneiden.", "Mit Deckel in den kalten Ofen: 50 Minuten bei 250°C, dann 10–15 Minuten ohne Deckel bei 220°C. Auf einem Gitter auskühlen lassen."]}, {"id": 1202, "product": "lilly", "title": "Schnelles Dinkel-Joghurt-Brot", "category": "Brot", "time": "60 Min (+ 60 Min Gehzeit)", "temp": "200°C", "portions": "1 Brot", "ingredients": ["450 g Dinkelmehl Type 630", "1 Pck. Trockenhefe (7 g)", "250 g Naturjoghurt", "100 g Wasser, lauwarm", "10 g Salz", "1 TL Honig"], "steps": ["Alle Zutaten 5 Minuten zu einem geschmeidigen Teig verkneten.", "Abgedeckt 60 Minuten gehen lassen, bis sich das Volumen sichtbar vergrößert.", "Topf fetten, Teig zum Laib formen, hineinlegen und einschneiden.", "Mit Deckel in den kalten Ofen, 50 Minuten bei 200°C.", "Deckel abnehmen und weitere 10 Minuten goldbraun backen.", "Auf einem Gitter auskühlen lassen."]}, {"id": 1203, "product": "lilly", "title": "Karotten-Walnuss-Krustenbrot", "category": "Brot", "time": "60 Min (+ ca. 14 Std Reife)", "temp": "240°C → 210°C", "portions": "1 Brot", "ingredients": ["100 g aktives Anstellgut (Weizen)", "350 g Weizenmehl Type 1050", "100 g Dinkelvollkornmehl", "150 g Karotten, fein geraspelt", "50 g Walnüsse, gehackt", "240 g Wasser, lauwarm", "10 g Salz"], "steps": ["Anstellgut, Mehle und Wasser verkneten und 30 Minuten quellen lassen.", "Salz zugeben, kneten, dann Karotten und Walnüsse einarbeiten.", "Stockgare 4–5 Stunden, zweimal dehnen und falten.", "Formen, ins Körbchen geben und über Nacht in den Kühlschrank stellen.", "In den gefetteten Topf stürzen und einschneiden.", "Mit Deckel in den kalten Ofen: 45 Minuten bei 240°C, dann 12–15 Minuten ohne Deckel bei 210°C."]}, {"id": 1204, "product": "lilly", "title": "Kräftiges Roggen-Mischbrot", "category": "Brot", "time": "65 Min (+ ca. 4 Std Reife)", "temp": "250°C → 220°C", "portions": "1 Brot", "ingredients": ["120 g aktives Anstellgut (Roggen)", "250 g Roggenmehl Type 1150", "180 g Weizenmehl Type 1050", "320 g Wasser, lauwarm", "11 g Salz", "1 TL Brotgewürz, gemahlen"], "steps": ["Alle Zutaten zu einem klebrigen Teig verrühren – Roggen braucht kein langes Kneten.", "2–3 Stunden gehen lassen, bis sich Blasen zeigen.", "Mit nassen Händen in den gefetteten, bemehlten Topf streichen.", "Mit Mehl bestäuben und ca. 1 Stunde reifen, bis die Oberfläche aufreißt.", "Mit Deckel in den kalten Ofen: 50 Minuten bei 250°C, dann 15 Minuten ohne Deckel bei 220°C.", "Auf einem Gitter auskühlen lassen."]}, {"id": 1205, "product": "lilly", "title": "Schnelles Bierbrot", "category": "Brot", "time": "55 Min", "temp": "200°C", "portions": "1 Brot", "ingredients": ["400 g Weizenmehl Type 550", "1 Pck. Backpulver", "330 ml Bier", "8 g Salz", "1 TL Zucker", "Nach Wunsch: Saaten obenauf"], "steps": ["Mehl, Backpulver, Salz und Zucker mischen.", "Bier zugießen und nur kurz verrühren – nicht kneten.", "Teig in den gefetteten Topf geben und glattstreichen.", "Mit Deckel in den kalten Ofen, 45 Minuten bei 200°C.", "Deckel abnehmen und weitere 10 Minuten backen.", "Auf einem Gitter auskühlen lassen."]}, {"id": 1206, "product": "lilly", "title": "Saftiges Körner-Saatenbrot", "category": "Brot", "time": "60 Min (+ 60 Min Gehzeit)", "temp": "220°C", "portions": "1 Brot", "ingredients": ["300 g Weizenmehl Type 1050", "100 g Roggenmehl Type 1150", "1 Pck. Trockenhefe (7 g)", "320 g Wasser, lauwarm", "10 g Salz", "100 g Saatenmix (Sonnenblume, Kürbis, Lein, Sesam)"], "steps": ["Saaten kurz in einer Pfanne ohne Fett anrösten und etwas abkühlen lassen.", "Mehle, Hefe, Wasser und Salz verkneten, dann Saaten unterarbeiten.", "Abgedeckt 60 Minuten gehen lassen.", "Zum Laib formen, in den gefetteten Topf geben, einschneiden und mit Saaten bestreuen.", "Mit Deckel in den kalten Ofen, 50 Minuten bei 220°C.", "Deckel abnehmen und 10 Minuten fertig backen. Auskühlen lassen."]}, {"id": 1207, "product": "lilly", "title": "Saftiger Hefezopf", "category": "Frühstück", "time": "35 Min (+ 80 Min Gehzeit)", "temp": "175°C", "portions": "1 Zopf", "ingredients": ["400 g Weizenmehl Type 550", "1 Pck. Trockenhefe (7 g)", "180 ml Milch, lauwarm", "60 g weiche Butter", "60 g Zucker", "1 Ei", "Eigelb & Hagelzucker zum Bestreichen"], "steps": ["Alle Zutaten 8 Minuten zu einem geschmeidigen Teig kneten und 60 Minuten gehen lassen.", "In drei Stränge teilen und einen Zopf flechten.", "Zopf in den gefetteten Topf legen und 20 Minuten ruhen lassen.", "Mit verquirltem Eigelb bestreichen und mit Hagelzucker bestreuen.", "Ohne Deckel in den kalten Ofen, 35 Minuten bei 175°C goldbraun backen.", "Im Topf kurz ruhen, dann auf einem Gitter auskühlen lassen."]}, {"id": 1208, "product": "lilly", "title": "Zimt-Rosinen-Brot", "category": "Frühstück", "time": "35 Min (+ 80 Min Gehzeit)", "temp": "180°C", "portions": "1 Brot", "ingredients": ["400 g Weizenmehl Type 550", "1 Pck. Trockenhefe (7 g)", "200 ml Milch, lauwarm", "40 g weiche Butter", "50 g Zucker", "100 g Rosinen", "2 TL Zimt"], "steps": ["Rosinen kurz in warmem Wasser einweichen und abtropfen lassen.", "Mehl, Hefe, Milch, Butter, Zucker und eine Prise Salz kneten.", "Rosinen und Zimt unterarbeiten und 60 Minuten gehen lassen.", "Zum Laib formen, in den gefetteten Topf geben und 20 Minuten ruhen lassen.", "Ohne Deckel in den kalten Ofen, 35 Minuten bei 180°C.", "Auf einem Gitter auskühlen lassen."]}, {"id": 1209, "product": "lilly", "title": "Baked Oatmeal mit Beeren", "category": "Frühstück", "time": "40 Min", "temp": "180°C", "portions": "3–4", "ingredients": ["200 g Haferflocken", "350 ml Milch", "2 Eier", "1 reife Banane", "40 g Ahornsirup oder Honig", "1 TL Backpulver", "150 g Beeren (auch TK)"], "steps": ["Banane zerdrücken und mit Eiern, Milch und Sirup verrühren.", "Haferflocken, Backpulver, etwas Zimt und eine Prise Salz unterrühren.", "Die Hälfte der Beeren unterheben.", "Masse in den gefetteten Topf geben und die restlichen Beeren daraufsetzen.", "Ohne Deckel in den kalten Ofen, 40 Minuten bei 180°C.", "Warm mit Joghurt servieren."]}, {"id": 1210, "product": "lilly", "title": "Fluffiger Quark-Stuten", "category": "Frühstück", "time": "35 Min (+ 80 Min Gehzeit)", "temp": "180°C", "portions": "1 Stuten", "ingredients": ["350 g Weizenmehl Type 550", "1 Pck. Trockenhefe (7 g)", "150 g Magerquark", "80 ml Milch, lauwarm", "40 g weiche Butter", "40 g Zucker", "1 Ei"], "steps": ["Alle Zutaten mit einer Prise Salz 8 Minuten kneten.", "60 Minuten gehen lassen, bis sich der Teig verdoppelt.", "Zum Laib formen, in den gefetteten Topf geben und 20 Minuten ruhen lassen.", "Nach Wunsch einschneiden und mit Milch bestreichen.", "Ohne Deckel in den kalten Ofen, 35 Minuten bei 180°C.", "Auf einem Gitter auskühlen lassen."]}, {"id": 1211, "product": "lilly", "title": "Kräuter-Käse-Zupfbrot", "category": "Snack", "time": "35 Min (+ 65 Min Gehzeit)", "temp": "180°C", "portions": "1 Topf", "ingredients": ["400 g Weizenmehl Type 550", "1 Pck. Trockenhefe (7 g)", "230 g Milch, lauwarm", "40 g weiche Butter", "8 g Salz", "Für die Füllung: 70 g weiche Kräuterbutter", "100 g geriebener Käse"], "steps": ["Mehl, Hefe, Milch, Butter und Salz 8 Minuten kneten und 45 Minuten gehen lassen.", "Teig dünn rechteckig ausrollen und mit Kräuterbutter bestreichen.", "In Quadrate schneiden und aufeinanderstapeln.", "Hochkant in den gefetteten Topf setzen und mit dem halben Käse bestreuen.", "20 Minuten gehen lassen, dann den restlichen Käse darübergeben.", "Ohne Deckel 35 Minuten bei 180°C backen. Lauwarm servieren."]}, {"id": 1212, "product": "lilly", "title": "Rosmarin-Focaccia", "category": "Snack", "time": "28 Min (+ 80 Min Gehzeit)", "temp": "220°C", "portions": "1 Topf", "ingredients": ["300 g Weizenmehl Type 550", "1/2 Pck. Trockenhefe (5 g)", "210 g Wasser, lauwarm", "30 g Olivenöl", "6 g Salz", "Belag: Olivenöl, Rosmarin, Meersalz"], "steps": ["Alle Zutaten zu einem weichen Teig verkneten und 60 Minuten gehen lassen.", "Topf großzügig mit Olivenöl ausstreichen und den Teig flach hineindrücken.", "Mit öligen Fingern die typischen Dellen eindrücken.", "Mit Olivenöl, Rosmarin und Meersalz belegen und 20 Minuten ruhen lassen.", "Ohne Deckel in den kalten Ofen, 28 Minuten bei 220°C goldbraun backen.", "Lauwarm in Stücke schneiden."]}, {"id": 1213, "product": "lilly", "title": "Knusprige Ofenkartoffeln", "category": "Beilage", "time": "40 Min", "temp": "220°C", "portions": "2–3", "ingredients": ["600 g festkochende Kartoffeln", "3 EL Olivenöl", "1 TL Paprikapulver", "1 Zweig Rosmarin", "1 Knoblauchzehe", "Salz, Pfeffer"], "steps": ["Kartoffeln in Spalten schneiden.", "Mit Öl, gepresstem Knoblauch und Gewürzen vermengen.", "In den Topf geben.", "Ohne Deckel in den kalten Ofen, 40 Minuten bei 220°C.", "Nach 25 Minuten einmal wenden.", "Heiß mit Kräuterquark servieren."]}, {"id": 1214, "product": "lilly", "title": "Deftige Gulaschsuppe", "category": "Suppe", "time": "90 Min", "temp": "180°C", "portions": "3–4", "ingredients": ["300 g Rindergulasch", "2 Zwiebeln", "2 Paprika", "200 g Kartoffeln", "2 EL Tomatenmark", "2 EL Paprikapulver", "700 ml Brühe", "Kümmel, Majoran, Knoblauch"], "steps": ["Fleisch, gewürfelte Zwiebeln, Paprika und Kartoffeln in den Topf geben.", "Tomatenmark, Gewürze und Brühe zugeben und gut vermengen.", "Mit Deckel in den kalten Ofen.", "90 Minuten bei 180°C schmoren lassen.", "Nach der Hälfte einmal umrühren.", "Mit Salz und Pfeffer abschmecken."]}, {"id": 1215, "product": "lilly", "title": "Cremige Kartoffelsuppe", "category": "Suppe", "time": "60 Min", "temp": "180°C", "portions": "3–4", "ingredients": ["500 g Kartoffeln", "2 Möhren", "1 Stange Lauch", "100 g Knollensellerie", "700 ml Brühe", "100 ml Sahne", "Majoran, Salz, Pfeffer"], "steps": ["Gemüse würfeln und in den Topf geben.", "Mit Brühe und Majoran auffüllen.", "Mit Deckel in den kalten Ofen, 60 Minuten bei 180°C.", "Etwa die Hälfte fein pürieren, den Rest stückig lassen.", "Sahne unterrühren und abschmecken.", "Mit frischer Petersilie servieren."]}, {"id": 1216, "product": "lilly", "title": "Samtige Kürbissuppe", "category": "Suppe", "time": "50 Min", "temp": "190°C", "portions": "3–4", "ingredients": ["600 g Hokkaido-Kürbis", "1 Zwiebel", "1 Möhre", "1 Stück frischer Ingwer", "200 ml Kokosmilch", "500 ml Brühe", "Currypulver, Salz, Pfeffer"], "steps": ["Kürbis (mit Schale), Zwiebel, Möhre und Ingwer würfeln.", "Mit Brühe und Curry in den Topf geben.", "Mit Deckel in den kalten Ofen, 50 Minuten bei 190°C.", "Fein pürieren.", "Kokosmilch unterrühren und kurz durchziehen lassen.", "Mit gerösteten Kürbiskernen servieren."]}, {"id": 1217, "product": "lilly", "title": "Herzhafter Linseneintopf", "category": "Eintopf", "time": "75 Min", "temp": "180°C", "portions": "3–4", "ingredients": ["200 g Tellerlinsen", "2 Möhren", "200 g Kartoffeln", "1 Zwiebel", "1 EL Tomatenmark", "700 ml Brühe", "Lorbeer, Essig, Salz, Pfeffer"], "steps": ["Gemüse würfeln und mit den Linsen in den Topf geben.", "Tomatenmark, Lorbeer und Brühe zufügen.", "Mit Deckel in den kalten Ofen, 75 Minuten bei 180°C.", "Nach der Hälfte umrühren, bei Bedarf Brühe nachgießen.", "Mit einem Schuss Essig abschmecken.", "Nach Wunsch mit Würstchen servieren."]}, {"id": 1218, "product": "lilly", "title": "Hähnchen-Gemüse-Schmortop function calcStonewareRecipe(){
 const txt = document.getElementById("recipeCalc")?.value?.trim();
 const fromId = document.getElementById("convertFrom")?.value;
 const toId   = document.getElementById("convertTo")?.value;

 if(!txt){
   alert("Bitte zuerst ein Rezept oder die Zutaten eintippen.");
   return;
 }

 const sizeFrom = productSizes[fromId] || 1;
 const sizeTo   = productSizes[toId]   || 1;
 const factor   = sizeTo / sizeFrom;

 const fromLabel = products.find(p=>p.id===fromId)?.label || fromId;
 const toLabel   = products.find(p=>p.id===toId)?.label   || toId;

 const lines = txt.split("\n").filter(Boolean);

 const out = lines.map(line=>{
   return line.replace(/(\d+[,.]?\d*)\s*(g|kg|ml|l|EL|TL|Stueck|Stück|Dose|Dosen|Pck\.?|Becher)?/gi,(m,num,unit="",offset,str)=>{
     const val = parseFloat(num.replace(",","."));
     if(!Number.isFinite(val)) return m;
     const before = String(str).slice(0,offset).toLowerCase();
     if(!unit && /(mehl|dinkel|weizen|roggen|emmer|einkorn|vollkorn|type|typ)\s*$/.test(before)) return m;
     const u = unit.toLowerCase();
     let scaled = val * factor;
     scaled = (u==="kg" || u==="l") ? Math.round(scaled*100)/100 : Math.round(scaled*10)/10;
     return `${String(scaled).replace(".",",")}${unit?" "+unit:(m.length>num.length?" ":"")}`;
   });
 });

 const factorPretty = Math.round(factor*100)/100;
 const factorTxt = factorPretty === 1
   ? "Mengen bleiben gleich (etwa selbe Groesse)"
   : `Faktor: ${String(factorPretty).replace(".",",")}x`;

 document.getElementById("conversionFactor").innerHTML =
   `<div class="conversion-info">${fromLabel} → ${toLabel} · ${factorTxt}</div>`;

 document.getElementById("recipeOut").innerHTML =
   `<div style="background:#FFF8FB;border:1px solid #E8D5DC;border-radius:16px;padding:14px">
     <strong>Umgerechnetes Rezept</strong>
     ${out.map(x=>`<div style="padding:8px 0;border-bottom:1px solid #f0e4ea">${x}</div>`).join("")}
     <button class="btn full" style="margin-top:12px" onclick='addConvertedToShopping(window.lastConvertedItems.join("|"))'>Zur Einkaufsliste hinzufuegen</button>
   </div>`;

 window.lastConvertedItems = out;
}

function addConvertedToShopping(text){
const items=text.split("|");
items.forEach(x=>shoppingItems.push({text:x,done:false}));
localStorage.setItem("shopping-items",JSON.stringify(shoppingItems));
alert("Zur Einkaufsliste hinzugefügt ✓");
}

 // Zutat = beginnt mit Menge + Einheit (g, ml, EL ...). Nummerierte Schritte (1. / 1)) zaehlen NICHT als Zutat.

   /^(½|¼|¾|⅓|⅔|\d+([.,]\d+)?)\s*(g|kg|ml|l|el|tl|stk|stueck|stück|prise|prisen|pck|packung|dose|dosen|becher|tasse|bund|zehe|zehen|scheibe|scheiben)\b/i.test(l)

}

// TIMER - laeuft im Hintergrund auch beim Tab-Wechsel

window.stonewareTimer = window.stonewareTimer || {
 running: false,
 remaining: 0,
 endTime: 0,
 interval: null
};

function timerSet(seconds){
 const t = window.stonewareTimer;
 if(t.interval){clearInterval(t.interval); t.interval=null;}
 t.running = false;
 t.remaining = Math.max(0, Math.round(seconds));
 t.endTime = 0;
 renderTimer();
}

function timerSetCustom(){
 const inp = document.getElementById("timerCustomMin");
 if(!inp) return;
 const min = parseFloat(String(inp.value).replace(",","."));
 if(!Number.isFinite(min) || min <= 0){
   alert("Bitte eine Zahl groesser als 0 eingeben.");
   return;
 }
 timerSet(min * 60);
 inp.value = "";
}

function timerStart(){
 const t = window.stonewareTimer;
 if(t.remaining <= 0){
   alert("Bitte zuerst eine Zeit waehlen (Preset oder eigene Minuten).");
   return;
 }
 if("Notification" in window && Notification.permission === "default"){
   try{ Notification.requestPermission(); }catch(e){}
 }
 t.running = true;
 t.endTime = Date.now() + t.remaining * 1000;
 if(t.interval) clearInterval(t.interval);
 t.interval = setInterval(timerTick, 250);
 renderTimer();
}

function timerTick(){
 const t = window.stonewareTimer;
 const left = Math.max(0, Math.round((t.endTime - Date.now())/1000));
 t.remaining = left;
 if(left <= 0) timerFinished(); else renderTimer();
}

function timerPause(){
 const t = window.stonewareTimer;
 if(!t.running) return;
 if(t.interval){clearInterval(t.interval); t.interval=null;}
 t.running = false;
 renderTimer();
}

function timerReset(){ timerSet(0); }

function timerFinished(){
 const t = window.stonewareTimer;
 if(t.interval){clearInterval(t.interval); t.interval=null;}
 t.running = false;
 t.remaining = 0;
 renderTimer();
 // 3x Beep
 try{
   const ctx = new (window.AudioContext || window.webkitAudioContext)();
   for(let i=0;i<3;i++){
     const osc = ctx.createOscillator();
     const gain = ctx.createGain();
     osc.connect(gain); gain.connect(ctx.destination);
     osc.frequency.value = 660; osc.type = "sine";
     const t0 = ctx.currentTime + i*0.55;
     osc.start(t0);
     gain.gain.setValueAtTime(0.0001, t0);
     gain.gain.exponentialRampToValueAtTime(0.25, t0 + 0.02);
     gain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.45);
     osc.stop(t0 + 0.5);
   }
 }catch(e){}
 if("Notification" in window && Notification.permission === "granted"){
   try{ new Notification("🌸 Stoneware Timer fertig!", {body:"Deine Zeit ist abgelaufen.",icon:"icons/icon-192.png"}); }catch(e){}
 }
 const display = document.getElementById("timerDisplay");
 if(display){ display.classList.add("finished"); setTimeout(()=>display.classList.remove("finished"), 2100); }
 setTimeout(()=>alert("🌸 Timer fertig!"), 50);
}

function renderTimer(){
 const t = window.stonewareTimer;
 const display = document.getElementById("timerDisplay");
 if(!display) return;
 const min = Math.floor(t.remaining/60);
 const sec = t.remaining % 60;
 display.textContent = `${String(min).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
 const status = document.getElementById("timerStatus");
 if(status){
   if(t.running){ status.textContent = "läuft …"; status.classList.add("running"); }
   else if(t.remaining > 0){ status.textContent = "pausiert"; status.classList.remove("running"); }
   else{ status.textContent = "bereit"; status.classList.remove("running"); }
 }
}

// Parse Rezept-Zeit-Strings wie "55–60 Min", "1 Std", "30 Min", "1:30 h"
function parseRecipeTime(timeStr){
 if(!timeStr) return 0;
 const str = String(timeStr).toLowerCase().replace(/–|—/g,"-");
 // Bereich: "55-60 min" oder "1-2 std"
 const range = str.match(/(\d+(?:[.,]\d+)?)\s*-\s*(\d+(?:[.,]\d+)?)\s*(min|minut|std|stunde|h|sek)/);
 if(range){
   const val = Math.max(parseFloat(range[1].replace(",",".")), parseFloat(range[2].replace(",",".")));
   return convertToSeconds(val, range[3]);
 }
 // Format "1:30 h" oder "1:30 std"
 const hm = str.match(/(\d+):(\d+)\s*(h|std|stunde)/);
 if(hm){
   return (parseInt(hm[1]) * 3600) + (parseInt(hm[2]) * 60);
 }
 // Einzelwert: "45 min", "1.5 h", "30 minuten"
 const single = str.match(/(\d+(?:[.,]\d+)?)\s*(min|minut|std|stunde|h|sek)/);
 if(single){
   return convertToSeconds(parseFloat(single[1].replace(",",".")), single[2]);
 }
 // Nur Zahl ohne Einheit -> Minuten annehmen
 const num = str.match(/(\d+(?:[.,]\d+)?)/);
 if(num){
   return Math.round(parseFloat(num[1].replace(",",".")) * 60);
 }
 return 0;
}

function convertToSeconds(val, unit){
 if(unit === "h" || unit.startsWith("std") || unit.startsWith("stunde")) return Math.round(val * 3600);
 if(unit.startsWith("sek")) return Math.round(val);
 return Math.round(val * 60); // min als Standard
}

function startTimerFromRecipe(timeStr, title){
 const secs = parseRecipeTime(timeStr);
 if(secs <= 0){
   alert("Konnte die Zeit nicht erkennen. Bitte im Tools-Tab manuell setzen.");
   showTab("tools");
   return;
 }
 timerSet(secs);
 timerStart();
 // Toast statt Tab-Wechsel - User bleibt im Rezept
 showToast(`⏱ Timer fuer "${title}" gestartet (${Math.round(secs/60)} Min). Schau im Tools-Tab.`);
}

function addRecipeToShopping(id){
 const r = allRecipes().find(x=>String(x.id)===String(id));
 if(!r) return;
 if(!window.shoppingItems) window.shoppingItems = JSON.parse(localStorage.getItem("shopping-items")||"[]");
 let added = 0;
 r.ingredients.forEach(x=>{
   const txt = String(x).trim();
   if(!txt) return;
   // Duplikate vermeiden
   if(!window.shoppingItems.some(it=>it.text === txt)){
     window.shoppingItems.push({text: txt, done: false});
     added++;
   }
 });
 localStorage.setItem("shopping-items", JSON.stringify(window.shoppingItems));
 if(typeof renderShopping === "function") renderShopping();
 showToast(`🧾 ${added} Zutaten zur Einkaufsliste hinzugefuegt.`);
}

function showToast(msg){

   /(\d+(?:[.,]\d+)?(?:\s*[–\-]\s*\d+(?:[.,]\d+)?)?\s+(?:Min(?:uten?)?|Std(?:n|e|en)?|Stunden?|h)\b)/gi,
   (match) => {

     return `<button class="step-timer" data-time="${safeTime}" data-title="${safeTitle}" onclick="startStepTimerFromButton(this)">⏱ ${match.trim()}</button>`;
   }

// Wrap render to also refresh timer view + insert back-bar on non-home tabs

   const c = document.getElementById("content");
